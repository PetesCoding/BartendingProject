<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <link href="{{url_for('static', filename='css/style.css')}}" rel="stylesheet" type="text/css" />
    <title>Cocktail App</title>
</head>

<body class="bg-black text-white">

    <div class="nav-div">
        <nav class="nav-main">

            <a href="/" class="links">
                <div>
                    <i class="fa-solid fa-martini-glass-empty fa-xl" style="color: #ffffff;"></i>
                    <span class="icon-span-text" data-encore-id="text">Home</span>
                </div>
            </a>
            <a href="/bar" class="links">
                <div>
                    <i class="fa-solid fa-whiskey-glass fa-xl" style="color: #ffffff;"></i>
                    <span class="icon-span-text" data-encore-id="text">Bar</span>
                </div>
            </a>
            <a href="/ingredients" class="links">
                <div>
                    <i class="fa-regular fa-lemon fa-xl" style="color: #ffffff;"></i>
                    <span class="icon-span-text" data-encore-id="text">Ingredients</span>
                </div>
            </a>
            <a href="/popular" class="links">
                <div>
                    <i class="fa-regular fa-heart fa-xl" style="color: #ffffff;"></i>
                    <span class="icon-span-text" data-encore-id="text">Popular</span>
                </div>
            </a>
            <a href="/blog" class="links">
                <div>
                    <i class="fa-regular fa-newspaper fa-xl" style="color: #ffffff;"></i>
                    <span class="icon-span-text" data-encore-id="text">Blog</span>
                </div>
            </a>
            <a href="/cocktaillist" class="links">
                <div>
                    <i class="fa-solid fa-beer-mug-empty fa-xl" style="color: #ffffff;"></i>
                    <span class="icon-span-text" data-encore-id="text">Cocktails</span>
                </div>
            </a>

        </nav>
    </div>

    <div class="button_div">

        {% for cocktail in cocktails %}

        <div class="inner_button_div">
            <a href="/cocktails/{{ cocktail.Name }}">
                <button class="cocktail_buttons" type="button" value="{{ cocktail.Name }}" name="{{ cocktail.Name }}">
                    <i class="fa-solid fa-martini-glass-citrus fa-2xl cocktail-button-icon" style="color: #da3f0b;"></i>
                    <span class="cocktail-button-text">{{ cocktail.Name }}</span>
                </button>
            </a>
        </div>

        {% endfor %}

    </div>

    <script>
        if ( window.history.replaceState ) {
            window.history.replaceState( null, null, window.location.href );
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/134bccfda6.js" crossorigin="anonymous"></script>
</body>

</html>
